services:
  backend:
    build: ./server
    container_name: auth-backend
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    container_name: auth-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: authdb
      MYSQL_USER: authuser
      MYSQL_PASSWORD: authpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"

volumes:
  mysql_data: